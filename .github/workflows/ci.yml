name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  native:
    name: Native (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (cargo, MSVC toolchain)
          - { rid: win-x86,         os: windows-latest,   target: i686-pc-windows-msvc,           lib: symbolic_native.dll }
          - { rid: win-x64,         os: windows-latest,   target: x86_64-pc-windows-msvc,         lib: symbolic_native.dll }
          - { rid: win-arm64,       os: windows-11-arm,   target: aarch64-pc-windows-msvc,        lib: symbolic_native.dll }
          # Linux glibc (cross)
          - { rid: linux-x86,       os: ubuntu-latest,    target: i686-unknown-linux-gnu,         lib: libsymbolic_native.so,    cross: true }
          - { rid: linux-x64,       os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,       lib: libsymbolic_native.so,    cross: true }
          - { rid: linux-arm,       os: ubuntu-latest,    target: armv7-unknown-linux-gnueabihf,  lib: libsymbolic_native.so,    cross: true }
          - { rid: linux-arm64,     os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu,      lib: libsymbolic_native.so }
          # macOS (cargo)
          - { rid: osx-x64,         os: macos-26-intel,   target: x86_64-apple-darwin,            lib: libsymbolic_native.dylib }
          - { rid: osx-arm64,       os: macos-latest,     target: aarch64-apple-darwin,           lib: libsymbolic_native.dylib }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.cross }}
        with:
          targets: ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.cross

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        working-directory: native
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p runtimes/${{ matrix.rid }}/native
          cp native/target/${{ matrix.target }}/release/${{ matrix.lib }} runtimes/${{ matrix.rid }}/native/

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}
          if-no-files-found: error

  test:
    name: Test (${{ matrix.rid }})
    needs: native
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners
          - { rid: win-x64,     os: windows-latest }
          - { rid: win-x86,     os: windows-latest, arch: x86 }
          - { rid: win-arm64,   os: windows-11-arm }
          - { rid: linux-x64,   os: ubuntu-latest }
          - { rid: linux-arm64, os: ubuntu-24.04-arm }
          - { rid: osx-x64,     os: macos-26-intel }
          - { rid: osx-arm64,   os: macos-latest }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          architecture: ${{ matrix.arch || '' }}

      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}

      - name: Test
        run: dotnet test ${{ matrix.arch && format('-a {0}', matrix.arch) || '' }}

  test-docker:
    name: Test (${{ matrix.rid }})
    needs: native
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: linux-x86,  runner: ubuntu-latest, platform: linux/386,    image: "debian:bullseye-slim" }
          - { rid: linux-arm,  runner: ubuntu-latest, platform: linux/arm/v7, image: "debian:bullseye-slim", dotnet: true }
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}

      - name: Write test scripts
        run: |
          cat > /tmp/test-native.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail
          apt-get update && apt-get install -y gcc
          cd /work
          gcc -o /tmp/test-native native/test.c -L runtimes/$RID/native -lsymbolic_native -Wl,-rpath,runtimes/$RID/native
          /tmp/test-native
          SCRIPT
          chmod +x /tmp/test-native.sh

          cat > /tmp/test-dotnet.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail
          apt-get update && apt-get install -y wget libicu-dev
          wget -q https://dot.net/v1/dotnet-install.sh -O /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel 10.0 --install-dir /usr/share/dotnet
          export PATH=/usr/share/dotnet:$PATH
          cd /work
          dotnet test
          SCRIPT
          chmod +x /tmp/test-dotnet.sh

      - name: Test (native)
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/work" \
            -e RID=${{ matrix.rid }} \
            -v /tmp/test-native.sh:/tmp/test-native.sh \
            ${{ matrix.image }} \
            bash /tmp/test-native.sh

      - name: Test (.NET)
        if: matrix.dotnet
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/work" \
            -v /tmp/test-dotnet.sh:/tmp/test-dotnet.sh \
            ${{ matrix.image }} \
            bash /tmp/test-dotnet.sh

  pack:
    name: Pack NuGet
    needs: [native, test, test-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: runtimes
          merge-multiple: true

      - name: Pack
        run: dotnet pack src/Symbolic/Symbolic.csproj -c Release -o artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: artifacts/*.nupkg
          if-no-files-found: error
