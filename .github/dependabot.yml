version: 2
updates:
  - package-ecosystem: cargo
    directory: /native
    schedule:
      interval: weekly
    commit-message:
      prefix: build

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
